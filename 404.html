<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting — Adrenaline</title>
</head>
<body>
    <p>Redirecting…</p>
    <script>
        const routes = {
            '/pricing': '/pricing.html',
            '/checkout': '/checkout.html',
            '/checkout/success': '/checkout-success.html',
            '/docs': '/docs.html',
            '/about': '/about.html',
            '/terms': '/terms.html',
            '/privacy': '/privacy.html'
        };
        if (window.location.pathname === '/discord') {
            window.location.replace('https://discord.gg/zPtyr26K7K');
        } else {
            const target = routes[window.location.pathname];
            if (target) {
                window.location.replace(target + window.location.search + window.location.hash);
            }
        }
    </script>
</body>
</html>
